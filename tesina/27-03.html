<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Club - Gestión de Socios</title>

<style>
body { font-family: Arial; margin: 0; background: #f4f4f4; }

.container { display: none; padding: 15px; }
.active { display: block; }

.login-box {
    max-width: 350px;
    margin: 80px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

.sidebar {
    width: 200px;
    background: #333;
    color: white;
    height: 100vh;
    position: fixed;
    padding: 15px;
}

.main {
    margin-left: 220px;
    padding: 20px;
}

table {
    width: 100%;
    background: white;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

.pago-container {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.pago-btn {
    background: green;
}

ul {
    background: white;
    padding: 10px;
    border-radius: 10px;
}

@media (max-width: 768px) {
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
    }

    .main {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container active">
    <div class="login-box">
        <h2>Iniciar sesión</h2>
        <input id="loginEmail" placeholder="Correo">
        <input id="loginPass" type="password" placeholder="Contraseña">
        <button onclick="entrar()">Ingresar</button>
    </div>
</div>

<!-- PANEL -->
<div id="panel" class="container">
    <div class="sidebar">
        <h2 id="rolUsuario"></h2>
        <button onclick="mostrarCrear()">Crear Usuario</button>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <div class="main">

        <!-- ADMIN -->
        <div id="vistaAdmin">
            <h2>Socios</h2>

            <button onclick="toggleFormSocio()">+ Agregar Socio</button>

            <div id="formSocio" style="display:none;">
                <input id="nombreSocio" placeholder="Nombre">
                <input id="emailSocio" placeholder="Email del socio">
                <button onclick="agregarSocio()">Guardar</button>
            </div>

            <div id="crearUser" style="display:none;">
                <input id="nuevoEmail" placeholder="Correo">
                <input id="nuevoPass" placeholder="Contraseña">
                <select id="nuevoRol">
                    <option value="Admin">Administrador</option>
                    <option value="Socio">Socio</option>
                    <option value="profesor">Profesor</option>
                    <option value="entrenador">Entrenador</option>
                </select>
                <button onclick="crearUsuario()">Guardar</button>
            </div>

            <table id="tabla"></table>
        </div>

        <!-- SOCIO -->
        <div id="vistaSocio" style="display:none;">
            <h2>Mi estado</h2>
            <p><b>Nombre:</b> <span id="miNombre"></span></p>
            <p><b>Estado:</b> <span id="miEstado"></span></p>
            <p><b>Próxima cuota:</b> <span id="miCuota"></span></p>

            <div class="pago-container">
                <h3>Pagar cuota</h3>
                <select id="metodoPago">
                    <option>Tarjeta</option>
                    <option>Transferencia</option>
                    <option>Efectivo</option>
                </select>
                <button class="pago-btn" onclick="pagar()">Pagar</button>
                <p id="mensajePago"></p>
            </div>

            <h3>Notificaciones</h3>
            <ul id="listaNotificaciones"></ul>
        </div>

        <!-- PROFESOR -->
        <div id="vistaProfesor" style="display:none;">
            <h2>Panel Profesor</h2>

            <div class="pago-container">
                <h3>Enviar notificación</h3>

                <select id="selectSocio"></select>

                <select id="tipoNotificacion">
                    <option value="Entreno">Entreno</option>
                    <option value="Rutina">Nueva Rutina</option>
                </select>

                <input id="mensajeProfe" placeholder="Ej: Entreno a las 21hs">

                <button onclick="enviarNotificacion()">Enviar</button>
            </div>
        </div>

        <!-- ENTRENADOR -->
        <div id="vistaEntrenador" style="display:none;">
            <h2>Panel Entrenador</h2>
            <p>Gestión de rutinas y asistencia.</p>
        </div>

    </div>
</div>

<script>
// DATOS
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [
    { email: "admin@mail.com", pass: "1234", rol: "Admin" }
];

let socios = JSON.parse(localStorage.getItem("socios")) || [];
let notificaciones = JSON.parse(localStorage.getItem("notificaciones")) || [];

let usuarioActual = null;

// GUARDAR
function guardar() {
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    localStorage.setItem("socios", JSON.stringify(socios));
    localStorage.setItem("notificaciones", JSON.stringify(notificaciones));
}

// LOGIN
function entrar() {
    let user = usuarios.find(u =>
        u.email === loginEmail.value && u.pass === loginPass.value
    );

    if (!user) return alert("Datos incorrectos");

    usuarioActual = user;

    login.classList.remove("active");
    panel.classList.add("active");

    rolUsuario.innerText = user.rol;

    vistaAdmin.style.display = "none";
    vistaSocio.style.display = "none";
    vistaProfesor.style.display = "none";
    vistaEntrenador.style.display = "none";

    if (user.rol === "Admin") {
        vistaAdmin.style.display = "block";
        renderSocios();
    }

    if (user.rol === "Socio") {
        vistaSocio.style.display = "block";
        mostrarSocio();
    }

    if (user.rol === "profesor") {
        vistaProfesor.style.display = "block";

        selectSocio.innerHTML = "";
        socios.forEach(s => {
            let option = document.createElement("option");
            option.value = s.email;
            option.textContent = s.nombre;
            selectSocio.appendChild(option);
        });
    }

    if (user.rol === "entrenador") {
        vistaEntrenador.style.display = "block";
    }
}

// LOGOUT
function cerrarSesion() {
    usuarioActual = null;
    panel.classList.remove("active");
    login.classList.add("active");
}

// ADMIN
function mostrarCrear() {
    if (usuarioActual.rol !== "Admin") return;
    crearUser.style.display = crearUser.style.display === "none" ? "block" : "none";
}

function crearUsuario() {
    if (!nuevoEmail.value.includes("@") || !nuevoPass.value) {
        return alert("Completar correctamente");
    }

    usuarios.push({
        email: nuevoEmail.value,
        pass: nuevoPass.value,
        rol: nuevoRol.value
    });

    guardar();
    alert("Usuario creado");
}

function toggleFormSocio() {
    formSocio.style.display = formSocio.style.display === "none" ? "block" : "none";
}

function agregarSocio() {
    if (!nombreSocio.value || !emailSocio.value) {
        return alert("Completar campos");
    }

    let fecha = new Date();
    fecha.setDate(fecha.getDate() + 30);

    socios.push({
        nombre: nombreSocio.value,
        email: emailSocio.value,
        fecha: fecha.toISOString()
    });

    guardar();
    renderSocios();
}

// TABLA
function renderSocios() {
    tabla.innerHTML = `
        <tr>
            <th>Nombre</th>
            <th>Estado</th>
            <th>Cuota</th>
        </tr>
    `;

    socios.forEach(s => {
        let fecha = new Date(s.fecha);
        let estado = fecha < new Date() ? "Inactivo" : "Activo";

        let fila = tabla.insertRow();
        fila.innerHTML = `
            <td>${s.nombre}</td>
            <td style="color:${estado==="Activo"?"green":"red"}">${estado}</td>
            <td>${fecha.toLocaleDateString()}</td>
        `;
    });
}

// SOCIO
function mostrarSocio() {
    let s = socios.find(x => x.email === usuarioActual.email);
    if (!s) return;

    let fecha = new Date(s.fecha);
    let estado = fecha < new Date() ? "Inactivo" : "Activo";

    miNombre.innerText = s.nombre;
    miEstado.innerText = estado;
    miEstado.style.color = estado === "Activo" ? "green" : "red";
    miCuota.innerText = fecha.toLocaleDateString();

    listaNotificaciones.innerHTML = "";

    let misNotificaciones = notificaciones.filter(n => n.email === usuarioActual.email);

    misNotificaciones.forEach(n => {
        let li = document.createElement("li");
        li.innerText = `[${n.tipo}] ${n.mensaje} (${n.fecha})`;
        listaNotificaciones.appendChild(li);
    });
}

// PAGO
function pagar() {
    let s = socios.find(x => x.email === usuarioActual.email);
    if (!s) return;

    let nuevaFecha = new Date();
    nuevaFecha.setDate(nuevaFecha.getDate() + 30);

    s.fecha = nuevaFecha.toISOString();

    guardar();
    mostrarSocio();

    mensajePago.style.color = "green";
    mensajePago.innerText = "✅ Pago realizado con éxito";
}

// NOTIFICAR
function enviarNotificacion() {
    if (!mensajeProfe.value) return alert("Escribí un mensaje");

    notificaciones.push({
        email: selectSocio.value,
        tipo: tipoNotificacion.value,
        mensaje: mensajeProfe.value,
        fecha: new Date().toLocaleString()
    });

    guardar();
    mensajeProfe.value = "";

    alert("Notificación enviada");
}
</script>

</body>
</html>
