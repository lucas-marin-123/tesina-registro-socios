<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Deportivo</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo Club">
    <h2>Club Deportivo</h2>
  </div>

  <div class="header-actions">
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="mostrarPantalla('login')">Iniciar Sesión</button>
  </div>
</header>

<!-- INICIO -->
<section id="inicio" class="pantalla activa">

  <div class="landing">
    <h1>Bienvenido</h1>
    <p>Gestioná tu club de forma simple</p>
    <button onclick="mostrarPantalla('login')">Comenzar</button>
  </div>

  <!-- CALENDARIO -->
  <div class="calendario card">
    <div class="cal-header">
      <button onclick="cambiarMes(-1)">⬅</button>
      <h2 id="mesAnio"></h2>
      <button onclick="cambiarMes(1)">➡</button>
    </div>

    <div class="dias">
      <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div>
      <div>Jue</div><div>Vie</div><div>Sáb</div>
    </div>

    <div id="gridCalendario" class="grid"></div>
  </div>

</section>

<!-- LOGIN -->
<section id="login" class="pantalla center">

  <div class="card login-box">
    <h2>Iniciar Sesión</h2>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
  </div>

</section>

<!-- ADMIN -->
<section id="admin" class="pantalla dashboard">

  <aside class="sidebar">
    <h3>Admin</h3>
    <button onclick="mostrarSeccionAdmin('crearUsuario')">👤 Crear Usuario</button>
    <button onclick="mostrarSeccionAdmin('registrarSocio')">➕ Registrar Socio</button>
    <button onclick="mostrarSeccionAdmin('verSocios')">📋 Ver Socios</button>
    <button onclick="logout()">🚪 Salir</button>
  </aside>

  <main>

    <div class="stats">
      <div class="card">Total Socios: <span id="totalSocios">0</span></div>
      <div class="card">Ingresos: $<span id="ingresos">0</span></div>
    </div>

    <!-- CREAR USUARIO -->
    <div id="crearUsuario" class="admin-seccion card">
      <h3>Crear Usuario</h3>

      <input id="nuevoEmail" placeholder="Email">
      <input id="nuevoPass" placeholder="Contraseña">

      <select id="nuevoRol" onchange="mostrarCampoDeporte()">
        <option value="admin">Administrador</option>
        <option value="entrenador">Entrenador</option>
        <option value="socio">Socio</option>
      </select>

      <input id="deporteProfe" placeholder="Deporte" style="display:none;">
      <button onclick="crearUsuario()">Guardar</button>
    </div>

    <!-- REGISTRAR SOCIO -->
    <div id="registrarSocio" class="admin-seccion card">
      <h3>Registrar Socio</h3>

      <input id="nombreSocio" placeholder="Nombre">
      <input id="deporteSocio" placeholder="Deporte">

      <select id="estadoSocio">
        <option>Al día</option>
        <option>Pendiente</option>
      </select>

      <button onclick="agregarSocio()">Agregar</button>
    </div>

    <!-- VER SOCIOS -->
    <div id="verSocios" class="admin-seccion card">
      <h3>Listado de Socios</h3>

      <input id="buscador" onkeyup="buscarSocio()" placeholder="Buscar socio...">

      <table id="tablaSocios">
        <tbody></tbody>
      </table>
    </div>

  </main>
</section>

<!-- ENTRENADOR -->
<section id="entrenador" class="pantalla">

  <div class="card">
    <h2 id="tituloEntrenador"></h2>
    <div id="listaEntrenador" class="cards"></div>
  </div>

  <div class="card">
    <h3>Reservar cancha</h3>
    <input type="date" id="fechaReserva">
    <input type="time" id="horaReserva">
    <button onclick="reservarCancha()">Reservar</button>
  </div>

  <div class="card">
    <h3>Eventos</h3>
    <input type="date" id="fechaEvento">
    <input type="text" id="eventoTexto">
    <button onclick="agregarEvento()">Agregar</button>
  </div>

  <button onclick="logout()">Salir</button>

</section>

<!-- SOCIO -->
<section id="socio" class="pantalla">

  <div class="card">
    <h3>Estado</h3>
    <div id="estadoSocioBox" class="estado"></div>
  </div>

  <div class="card">
    <button onclick="pagar()">Pagar cuota</button>
  </div>

  <div class="card">
    <h3>Historial</h3>
    <ul id="historialPagos"></ul>
  </div>

  <button onclick="logout()">Salir</button>

</section>

<script src="script.js"></script>
</body>
</html>
